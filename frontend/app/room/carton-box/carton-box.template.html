<button
  type="button"
  class="cursor-pointer border-0 bg-transparent p-0 transition-transform duration-200 hover:scale-110 hover:[filter:drop-shadow(0px_0px_2px_yellow)]"
  ng-style="$ctrl.getStyles()"
  ng-click="$ctrl.onClick($event)"
  ng-mousedown="$event.stopPropagation()"
  aria-label="Carton box"
>
  <div ng-style="$ctrl.getVisualStyles()"></div>
</button>

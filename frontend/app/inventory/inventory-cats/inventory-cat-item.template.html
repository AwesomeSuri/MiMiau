<div class="flex items-center rounded-xl gap-3 shadow-md p-4">
  <img
    ng-src="{{ $ctrl.cat.image }}"
    alt="{{ $ctrl.cat.name }}"
    class="h-16 w-16 shrink-0 object-contain"
  />
  <div class="flex min-w-0 flex-1 flex-col gap-1">
    <h3 class="md-subhead m-0 truncate">{{ $ctrl.cat.name }}</h3>
    <div class="flex items-center gap-0.5">
      <md-icon
        ng-repeat="filled in $ctrl.getLevelStars() track by $index"
        class="!h-4 !w-4 text-sm text-yellow-500"
      >
        {{ filled ? "star" : "star_border" }}
      </md-icon>
    </div>
  </div>
</div>

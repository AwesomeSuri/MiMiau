<div layout="column" layout-fill>
  <md-toolbar md-whiteframe="2">
    <div class="md-toolbar-tools" layout="row" layout-align="center center">
      <h1 class="md-title">MiMiau 🐾</h1>
    </div>
  </md-toolbar>

  <md-content flex layout="column" layout-align="center center">
    <p class="md-body-1" md-colors="{color: 'foreground-2'}">
      Game coming soon.
    </p>
  </md-content>

  <md-toolbar md-whiteframe="3">
    <div class="md-toolbar-tools" layout="row" layout-fill>
      <div flex></div>
      <div flex></div>
      <div flex layout="row" layout-align="end center">
        <md-button
          class="md-raised"
          ng-click="$ctrl.logout()"
          ng-disabled="$ctrl.isLoading"
          aria-label="Logout"
        >
          <md-icon ng-if="!$ctrl.isLoading">exit_to_app</md-icon>
          <md-progress-circular
            ng-if="$ctrl.isLoading"
            md-diameter="20"
            md-mode="indeterminate"
          ></md-progress-circular>
          <span ng-if="!$ctrl.isLoading">Logout</span>
        </md-button>
      </div>
    </div>
  </md-toolbar>

  <div
    ng-if="$ctrl.errorMessage"
    class="md-body-1 md-padding"
    md-colors="{color: 'warn'}"
    layout="row"
    layout-align="center center"
  >
    {{ $ctrl.errorMessage }}
  </div>
</div>

<div class="login-container landing-container">
    <h2>Welcome back to MiMiau 🐾</h2>
    
    <form (ngSubmit)="onLogin()">
      <div class="form-input-container">
        <label>Email Address</label>
        <input type="email" [(ngModel)]="credentials.email" name="email" required class="form-input">
      </div>
  
      <div class="form-input-container">
        <label>Password</label>
        <input type="password" [(ngModel)]="credentials.password" name="password" required class="form-input">
      </div>
  
      <button type="submit" [disabled]="isLoading" class="form-button green">
        <span *ngIf="isLoading" class="spinner"></span>
        <span *ngIf="!isLoading">Sign In</span>
      </button>
    </form>
  
    <p *ngIf="errorMessage" class="form-error-message">{{ errorMessage }}</p>

    <p class="form-message">New to MiMiau? <a routerLink="/register">Create a new account</a></p>
  </div>
